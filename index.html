<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Presensi Pegawai Badan Penanggulangan Bencana Daerah Provinsi Kalimantan Selatan</title>
  <link rel="icon" href="https://avatars.githubusercontent.com/u/295258675?v=4" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #eee;
      overflow: hidden; /* Mencegah scroll ganda */
      font-family: sans-serif;
    }

    .iframe-container {
      width: 100%;
      height: 100dvh; /* Menggunakan dvh agar pas di mobile browser */
      overflow: hidden;
      position: relative;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* --- Tombol Refresh Melayang --- */
    .refresh-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      background-color: #ff6b00; /* Warna Oranye khas BPBD */
      color: white;
      border: none;
      border-radius: 50%;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      z-index: 9999;
      transition: transform 0.2s, background-color 0.2s;
    }

    .refresh-btn:active {
      transform: scale(0.9);
      background-color: #e05e00;
    }

    /* Efek putar saat diklik */
    .spinning {
      animation: spin 0.8s ease-in-out;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="iframe-container">
    <button class="refresh-btn" id="refreshBtn" onclick="refreshIframe()" title="Refresh Aplikasi">
      🔄
    </button>

    <iframe
      id="app"
      src="https://script.google.com/macros/s/AKfycbzz6LlfY7pefQ4s2LTwuTKhTpylqKOT3EjPDWOT7icfGUms0c5WNxqBUjf15MKqwl9NYg/exec?p=admin"
      scrolling="yes"
      allowfullscreen="true"
      webkitallowfullscreen="true"
      mozallowfullscreen="true"
      allow="fullscreen; camera; microphone; display-capture; geolocation;">
    </iframe>
  </div>

  <script>
    function refreshIframe() {
      const iframe = document.getElementById('app');
      const btn = document.getElementById('refreshBtn');

      // 1. Tambahkan efek animasi berputar pada tombol
      btn.classList.add('spinning');
      setTimeout(() => {
        btn.classList.remove('spinning');
      }, 800);

      // 2. Paksa iframe untuk reload src-nya sendiri
      iframe.src = iframe.src;
    }
  </script>
</body>
</html>
